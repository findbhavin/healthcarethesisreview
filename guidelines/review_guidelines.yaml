  Stage 2 (Scope & novelty) → Section 10 (General)
  Stage 3 (Overall quality) → Section 10 (General)
  Stage 4 (Abstract) → Section 3 (Abstract)
  Stage 5 (Introduction) → Section 4 (Introduction)
  Stage 6 (Methodology) → Section 5 (Methods)
  Stage 7 (Results — analysis/statistics) → Section 6 (Results)
  Stage 7 (Results — tables/figures) → Section 9 (Tables & Figures)
  Stage 8 (Discussion) → Section 7 (Discussion and Conclusions)
  Stage 9 (References) → Section 8 (References)
  Stage 10 (Ethics & integrity) → Section 10 (General), labelled "Ethics & Integrity:"

# ---------------------------------------------------------------------------
# JOURNAL-SPECIFIC OVERRIDES
# ---------------------------------------------------------------------------
journal_overrides:
  NJCM:
    full_name: "National Journal of Community Medicine"
    scope: "Community medicine, public health, epidemiology, preventive medicine"
    word_limits:
      original_research: 3000
      review_article: 4500
      case_report: 1500
      short_communication: 1000
    required_sections:
      - "Abstract (structured: Background, Methods, Results, Conclusion)"
      - "Keywords (4–6 MeSH terms)"
      - "Introduction"
      - "Material and Methods"
      - "Results"
      - "Discussion"
      - "Conclusion"
      - "References (Vancouver style)"
    reference_style: "Vancouver"
    max_references:
      original_research: 30
      review_article: 60
      case_report: 15
  BMJ:
    full_name: "British Medical Journal"
    scope: "General medicine, clinical research, health policy"
    reference_style: "Vancouver"
  PLOS_ONE:
    full_name: "PLOS ONE"
    scope: "All scientific disciplines — broad scope"
    reference_style: "APA"

